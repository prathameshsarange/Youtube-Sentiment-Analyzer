<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Sentix | YouTube Sentiment Analysis</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Geist:wght@400&family=JetBrains+Mono:wght@500&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-lowest": "#060e20",
                        "secondary": "#89ceff",
                        "on-surface-variant": "#c7c4d7",
                        "surface": "#0b1326",
                        "primary": "#c0c1ff",
                        "on-primary": "#1000a9",
                        "primary-container": "#8083ff",
                        "on-primary-container": "#0d0096",
                        "outline": "#908fa0",
                        "on-surface": "#dae2fd",
                    },
                    "spacing": {
                        "margin-desktop": "64px",
                        "margin-mobile": "16px",
                        "section-gap": "128px",
                    },
                    "fontFamily": {
                        "label-md": ["JetBrains Mono"],
                        "body-lg": ["Geist"],
                        "display-lg": ["Sora"],
                        "headline-md": ["Sora"],
                    },
                    "fontSize": {
                        "label-md": ["14px", { "lineHeight": "1.4", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "display-lg-mobile": ["32px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                    }
                },
            },
        }
    </script>
    <style>
        body {
            background-color: #0b1326;
            color: #dae2fd;
        }

        .glass-card {
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .mesh-gradient {
            background-image: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(128, 131, 255, 0.1) 0px, transparent 50%);
        }

        .neon-glow-primary {
            box-shadow: 0px 8px 24px rgba(128, 131, 255, 0.3);
        }

        .neon-glow-primary:hover {
            box-shadow: 0px 8px 32px rgba(128, 131, 255, 0.5);
        }
    </style>
</head>

<body class="font-body-lg overflow-x-hidden mesh-gradient min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav
        class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-desktop py-4 bg-surface/80 backdrop-blur-xl border-b border-white/10 shadow-2xl">
        <div class="font-headline-md text-headline-md font-bold tracking-tighter text-primary">Sentix </div>
        <div class="text-on-surface-variant text-sm font-label-md">YouTube Comment Sentiment Analyzer</div>
    </nav>

    <!-- Hero Section -->
    <main class="flex-grow flex items-center justify-center">
        <section
            class="flex flex-col items-center justify-center text-center px-margin-mobile md:px-margin-desktop py-20">
            <div class="max-w-4xl space-y-8">
                <h1 class="font-display-lg text-display-lg-mobile md:text-display-lg text-primary tracking-tight">
                    Unlock the Pulse of <br class="hidden md:block" />
                    <span class="text-secondary">Your Audience</span>
                </h1>
                <p class="font-body-lg text-body-lg text-on-surface-variant max-w-2xl mx-auto">
                    Paste any YouTube video URL and instantly analyze the sentiment of its comments — Positive,
                    Negative, or Neutral.
                </p>
                <form action="/analyze" method="POST" class="mt-12 w-full max-w-2xl mx-auto">
                    <div class="flex flex-col md:flex-row items-center gap-4 w-full glass-card p-2 rounded-xl">
                        <div class="flex-1 flex items-center px-4 w-full">
                            <span class="material-symbols-outlined text-outline mr-3">link</span>
                            <input
                                class="bg-transparent border-none focus:ring-0 text-on-surface w-full font-label-md text-label-md py-3 focus:outline-none"
                                placeholder="https://www.youtube.com/watch?v=..." type="url" name="video_url"
                                required />
                        </div>
                        <button type="submit"
                            class="w-full md:w-auto bg-primary text-on-primary px-8 py-3 rounded-lg font-bold neon-glow-primary hover:scale-105 active:scale-95 transition-all">
                            Analyze Comments
                        </button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer
        class="w-full py-8 px-margin-desktop flex justify-between items-center bg-surface-container-lowest border-t border-white/5">
        <div class="font-headline-md text-headline-md font-bold text-primary">Sentix </div>
        <p class="font-body-lg text-on-surface-variant opacity-60 text-sm">© 2026 Sentix . Built by Prathamesh Sarange
        </p>
    </footer>

</body>

</html>
